version: "3.8"

services:
  glitchtip:
    image: ${GLITCHTIP_IMAGE:-docker.io/glitchtip/glitchtip:latest}
    container_name: redu-os-glitchtip
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      DATABASE_URL: postgres://${GLITCHTIP_POSTGRES_USERNAME:-glitchtip}:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/${GLITCHTIP_POSTGRES_DATABASE:-glitchtip}
      VALKEY_URL: redis://:${GLITCHTIP_REDIS_PASSWORD}@glitchtip-redis:6379/0
      REDIS_URL: redis://:${GLITCHTIP_REDIS_PASSWORD}@glitchtip-redis:6379/0
      CACHE_URL: redis://:${GLITCHTIP_REDIS_PASSWORD}@glitchtip-redis:6379/0
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-no-reply@example.com}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_URL:-http://127.0.0.1:8001}
      ALLOWED_HOSTS: "*"
      PORT: 8000
      ENABLE_USER_REGISTRATION: ${GLITCHTIP_ENABLE_USER_REGISTRATION:-true}
      ENABLE_SOCIAL_APPS_USER_REGISTRATION: ${GLITCHTIP_ENABLE_USER_REGISTRATION:-true}
      ENABLE_ORGANIZATION_CREATION: ${GLITCHTIP_ENABLE_ORGANIZATION_CREATION:-true}
      GLITCHTIP_ENABLE_UPTIME: ${GLITCHTIP_ENABLE_UPTIME:-true}
      GLITCHTIP_ENABLE_LOGS: ${GLITCHTIP_ENABLE_LOGS:-true}
      GLITCHTIP_ENABLE_MCP: ${GLITCHTIP_ENABLE_MCP:-false}
      GLITCHTIP_INSTANCE_NAME: ${GLITCHTIP_INSTANCE_NAME:-reduOS-GlitchTip}
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
      I_PAID_FOR_GLITCHTIP: "false"
      GLITCHTIP_EMBED_WORKER: "true"
    ports:
      - "${GLITCHTIP_PORT:-8001}:8000"
    volumes:
      - ../.local/glitchtip/uploads:/code/uploads
    depends_on:
      - glitchtip-postgres
      - glitchtip-redis

  glitchtip-postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: redu-os-glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GLITCHTIP_POSTGRES_DATABASE:-glitchtip}
      POSTGRES_USER: ${GLITCHTIP_POSTGRES_USERNAME:-glitchtip}
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD}
    volumes:
      - ../.local/glitchtip/postgres:/var/lib/postgresql/data

  glitchtip-redis:
    image: docker.io/library/redis:7-alpine
    container_name: redu-os-glitchtip-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${GLITCHTIP_REDIS_PASSWORD}
    volumes:
      - ../.local/glitchtip/redis:/data
