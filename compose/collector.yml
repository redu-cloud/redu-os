version: "3.8"

services:
  collector:
    build:
      context: ..
      dockerfile: Containerfile
    image: localhost/redu-os-collector:latest
    container_name: redu-os-collector
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      # Mount .local/ so runtime-config.json persists across container restarts
      - ../.local:/app/.local
    ports:
      - "${COLLECTOR_PORT:-3005}:3005"
