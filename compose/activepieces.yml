version: "3.8"

services:
  activepieces:
    image: docker.io/activepieces/activepieces:latest
    container_name: redu-os-activepieces
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://127.0.0.1:8080}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY}
      AP_JWT_SECRET: ${AP_JWT_SECRET}
      AP_DB_TYPE: POSTGRES
      AP_POSTGRES_HOST: activepieces-postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_DATABASE: ${AP_POSTGRES_DATABASE:-activepieces}
      AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:-activepieces}
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
      AP_POSTGRES_USE_SSL: "false"
      AP_REDIS_TYPE: STANDALONE
      AP_REDIS_HOST: activepieces-redis
      AP_REDIS_PORT: 6379
      AP_REDIS_DB: 0
      AP_QUEUE_UI_ENABLED: "false"
      AP_EXECUTION_MODE: ${AP_EXECUTION_MODE:-UNSANDBOXED}
      AP_CONTAINER_TYPE: ${AP_CONTAINER_TYPE:-WORKER_AND_APP}
      AP_TELEMETRY_ENABLED: ${AP_TELEMETRY_ENABLED:-false}
      AP_PIECES_SYNC_MODE: ${AP_PIECES_SYNC_MODE:-OFFICIAL_AUTO}
    ports:
      - "${ACTIVEPIECES_PORT:-8080}:80"
    depends_on:
      - activepieces-postgres
      - activepieces-redis

  activepieces-postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: redu-os-activepieces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AP_POSTGRES_DATABASE:-activepieces}
      POSTGRES_USER: ${AP_POSTGRES_USERNAME:-activepieces}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
    volumes:
      - ../.local/activepieces/postgres:/var/lib/postgresql/data

  activepieces-redis:
    image: docker.io/library/redis:7-alpine
    container_name: redu-os-activepieces-redis
    restart: unless-stopped
    volumes:
      - ../.local/activepieces/redis:/data
