version: "3.8"

services:
  langgraph:
    build:
      context: ../langgraph-app
      dockerfile: Containerfile
    image: localhost/redu-os-langgraph:latest
    container_name: redu-os-langgraph
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      LANGGRAPH_API_KEY: ${LANGGRAPH_API_KEY}
      LANGGRAPH_AI_ENABLED: ${LANGGRAPH_AI_ENABLED:-true}
      LANGGRAPH_AI_PROVIDER: ${LANGGRAPH_AI_PROVIDER:-openai-compatible}
      LANGGRAPH_AI_BASE_URL: ${LANGGRAPH_AI_BASE_URL:-}
      LANGGRAPH_AI_API_KEY: ${LANGGRAPH_AI_API_KEY:-}
      LANGGRAPH_AI_MODEL: ${LANGGRAPH_AI_MODEL:-local-deepseek}
      LANGGRAPH_MEMORY_ENABLED: ${LANGGRAPH_MEMORY_ENABLED:-true}
      LANGGRAPH_MEMORY_SEARCH_URL: ${LANGGRAPH_MEMORY_SEARCH_URL:-}
      LANGGRAPH_MEMORY_API_KEY: ${LANGGRAPH_MEMORY_API_KEY:-}
      LANGGRAPH_MEMORY_SEARCH_LIMIT: ${LANGGRAPH_MEMORY_SEARCH_LIMIT:-5}
      LANGGRAPH_COLLECTOR_ENABLED: ${LANGGRAPH_COLLECTOR_ENABLED:-true}
      LANGGRAPH_COLLECTOR_URL: ${LANGGRAPH_COLLECTOR_URL:-}
      LANGGRAPH_COLLECTOR_API_KEY: ${LANGGRAPH_COLLECTOR_API_KEY:-}
      LANGGRAPH_AUTOMATION_ENABLED: ${LANGGRAPH_AUTOMATION_ENABLED:-false}
      LANGGRAPH_AUTOMATION_WEBHOOK_URL: ${LANGGRAPH_AUTOMATION_WEBHOOK_URL:-}
      LANGGRAPH_AUTOMATION_WEBHOOK_API_KEY: ${LANGGRAPH_AUTOMATION_WEBHOOK_API_KEY:-}
      LANGGRAPH_REQUIRE_HUMAN_APPROVAL_FOR_HIGH_RISK: ${LANGGRAPH_REQUIRE_HUMAN_APPROVAL_FOR_HIGH_RISK:-true}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:1.5b}
    ports:
      - "${LANGGRAPH_PORT:-3010}:3010"
