version: "3.8"

services:
  collector:
    environment:
      SUPABASE_URL: http://host.containers.internal:8000
      AI_ENABLED: "true"
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-}
      AI_EMBEDDING_BASE_URL: ${AI_EMBEDDING_BASE_URL:-}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
      OLLAMA_URL: http://host.containers.internal:${OLLAMA_PORT:-11435}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:1.5b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      QDRANT_ENABLED: "true"
      QDRANT_URL: http://host.containers.internal:${QDRANT_REST_PORT:-6333}
      QDRANT_FALLBACK_EMBEDDINGS: "true"
      LANGFUSE_HOST: http://host.containers.internal:${LANGFUSE_PORT:-3007}
